<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 24" role="img" aria-label="Divider: plotted line">
<!-- Latitude Tutoring brand SVG asset. Themeable via CSS vars: lat-ink, lat-accent, lat-accent-2, lat-peach -->
  <line x1="30" y1="12" x2="210" y2="12" stroke="var(--lat-ink,#2E2925)" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <circle cx="30" cy="12" r="3.4" fill="var(--lat-accent,#C4724F)"/>
  <circle cx="210" cy="12" r="3.4" fill="var(--lat-accent,#C4724F)"/>
</svg>
