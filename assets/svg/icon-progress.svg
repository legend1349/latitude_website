<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Student progress and results">
<!-- Latitude Tutoring brand SVG asset. Themeable via CSS vars: lat-ink, lat-accent, lat-accent-2, lat-peach -->
  <g fill="none" stroke="var(--lat-ink,#2E2925)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="4.5" x2="5" y2="19" opacity="0.9"/>
    <line x1="5" y1="19" x2="20" y2="19" opacity="0.9"/>
    <polyline points="7,16 11,12.5 15,10 18,6" stroke="var(--lat-accent,#C4724F)" stroke-width="1.9"/>
    <circle cx="7" cy="16" r="1.3" fill="var(--lat-ink,#2E2925)" stroke="none"/>
    <circle cx="11" cy="12.5" r="1.3" fill="var(--lat-ink,#2E2925)" stroke="none"/>
    <circle cx="15" cy="10" r="1.3" fill="var(--lat-ink,#2E2925)" stroke="none"/>
    <circle cx="18" cy="6" r="2" fill="var(--lat-accent,#C4724F)" stroke="none"/>
  </g>
</svg>
